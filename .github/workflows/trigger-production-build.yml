name: Trigger Production Build

on:
  push:
    branches: [main]

jobs:
  trigger-codebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Trigger CodeBuild
        run: |
          aws codebuild start-build \
            --project-name bento-production-build \
            --source-version main \
            --secondary-sources-version-override sourceIdentifier=sushi,sourceVersion=${{ github.sha }}
          echo "Triggered bento-production-build with sushi commit ${{ github.sha }}"
